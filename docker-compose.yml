services:
  mysql:
    image: mysql:8.0
    container_name: angga_jaya_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: angga_jaya
      MYSQL_USER: angga_jaya
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: angga_jaya_phpmyadmin
    restart: unless-stopped
    ports:
      - "8181:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: angga_jaya
      PMA_PASSWORD: secret
    depends_on:
      - mysql

volumes:
  mysql_data:
